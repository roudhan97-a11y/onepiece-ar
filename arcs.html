<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأركات | عالم ون بيس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070B14;--bg2:#0D1421;--bg3:#141E30;--bg4:#1C2A40;--border:#243050;--border2:#2E3A56;--gold:#D4A843;--gold2:#B8902C;--gold3:#8A6B1E;--gold-glow:rgba(212,168,67,0.12);--red:#C0392B;--teal:#1ABC9C;--text:#EDE3D0;--text2:#A09080;--text3:#605850;--font:'IBM Plex Sans Arabic',sans-serif;--font-d:'Scheherazade New',serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden;line-height:1.7;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:3px;}

/* NAV */
nav{position:fixed;top:0;width:100%;background:rgba(7,11,20,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,168,67,0.12);z-index:1000;}
.nav-wrap{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:68px;}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold3));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(212,168,67,0.25);}
.logo-text{font-family:var(--font-d);font-size:1.35rem;color:var(--gold);font-weight:700;line-height:1.1;}
.logo-sub{font-size:0.62rem;color:var(--text3);}
.nav-back{display:flex;align-items:center;gap:8px;color:var(--text2);text-decoration:none;font-size:0.88rem;padding:8px 14px;border-radius:8px;border:1px solid var(--border);transition:all 0.2s;}
.nav-back:hover{border-color:var(--gold2);color:var(--gold);}

/* HERO */
.page-hero{min-height:38vh;display:flex;align-items:flex-end;position:relative;overflow:hidden;padding-top:68px;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(212,168,67,0.05) 0%,transparent 60%),linear-gradient(180deg,#0A1020 0%,var(--bg) 100%);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,transparent 60%);}
.hero-content{position:relative;z-index:2;max-width:1400px;margin:0 auto;padding:60px 24px 40px;width:100%;}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:var(--text3);margin-bottom:20px;}
.breadcrumb a{color:var(--gold);text-decoration:none;}
.page-title{font-family:var(--font-d);font-size:clamp(2rem,4vw,3rem);color:var(--text);font-weight:700;margin-bottom:8px;}
.page-title span{color:var(--gold);}
.page-desc{color:var(--text2);font-size:0.95rem;max-width:600px;line-height:1.8;}

/* CURRENT ARC */
.current-arc{display:inline-flex;align-items:center;gap:10px;background:rgba(212,168,67,0.08);border:1px solid rgba(212,168,67,0.2);border-radius:10px;padding:8px 16px;margin-top:16px;font-size:0.82rem;}
.ca-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.ca-text{color:var(--gold);font-weight:600;}
.ca-chapter{color:var(--text3);font-size:0.75rem;}

/* STATS */
.stats-bar{display:flex;gap:20px;flex-wrap:wrap;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.stat-n{font-family:var(--font-d);font-size:1.5rem;color:var(--gold);font-weight:700;display:block;}
.stat-l{font-size:0.72rem;color:var(--text3);}

/* FILTERS */
.filters{max-width:1400px;margin:0 auto;padding:32px 24px 20px;}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;min-width:240px;transition:border-color 0.2s;}
.search-box:focus-within{border-color:var(--gold2);}
.search-box input{background:none;border:none;outline:none;font-family:var(--font);font-size:0.9rem;color:var(--text);width:100%;direction:rtl;}
.search-box input::placeholder{color:var(--text3);}
.filter-select{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text2);font-family:var(--font);font-size:0.85rem;cursor:pointer;outline:none;direction:rtl;transition:border-color 0.2s;}
.filter-select:focus{border-color:var(--gold2);}
.tabs-row{display:flex;gap:8px;flex-wrap:wrap;}
.tab{padding:6px 14px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);font-size:0.8rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.tab.active,.tab:hover{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:700;}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:0 24px 80px;}

/* SAGA GROUP */
.saga-group{margin-bottom:56px;}
.saga-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid var(--border);}
.saga-badge{font-family:var(--font-d);font-size:1rem;font-weight:700;padding:7px 18px;border-radius:8px;}
.saga-count{font-size:0.75rem;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:6px;margin-right:auto;}
.saga-en{font-size:0.75rem;color:var(--text3);}

/* ARC CARDS */
.arcs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;}

.arc-card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.3s;position:relative;}
.arc-card:hover{border-color:var(--arc-color,var(--gold2));transform:translateY(-3px);box-shadow:0 14px 38px rgba(0,0,0,0.4);}
.arc-card.ongoing{border-color:rgba(212,168,67,0.25);}

.arc-top{padding:18px 20px 14px;border-bottom:1px solid var(--border);}
.arc-status-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.arc-status{font-size:0.65rem;font-weight:700;padding:3px 10px;border-radius:5px;}
.status-done{background:rgba(26,188,156,0.12);color:var(--teal);border:1px solid rgba(26,188,156,0.25);}
.status-ongoing{background:rgba(212,168,67,0.12);color:var(--gold);border:1px solid rgba(212,168,67,0.25);}
.arc-year{font-size:0.7rem;color:var(--text3);margin-right:auto;}

.arc-name{font-family:var(--font-d);font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.arc-name-en{font-size:0.72rem;color:var(--text3);margin-bottom:12px;}

.arc-meta{display:flex;gap:10px;flex-wrap:wrap;}
.arc-mi{font-size:0.72rem;color:var(--text3);background:var(--bg2);border:1px solid var(--border);padding:3px 10px;border-radius:5px;}
.arc-mi span{color:var(--text2);font-weight:500;}

/* KEY EVENTS */
.arc-events{padding:14px 20px;border-bottom:1px solid var(--border);}
.events-title{font-size:0.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.events-list{display:flex;flex-direction:column;gap:5px;}
.event-item{display:flex;align-items:flex-start;gap:7px;font-size:0.8rem;color:var(--text2);}
.event-dot{width:5px;height:5px;background:var(--arc-color,var(--gold3));border-radius:50%;flex-shrink:0;margin-top:7px;}

/* CHARACTERS */
.arc-chars{padding:14px 20px;}
.chars-section-title{font-size:0.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.chars-section-title.new-chars{color:var(--teal);}
.chars-section-title.imp-chars{color:var(--gold);}
.chars-grid-mini{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}

.char-mini{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;flex:1;min-width:140px;transition:border-color 0.2s;}
.char-mini:hover{border-color:var(--border2);}
.char-img{width:36px;height:36px;border-radius:7px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--text3);flex-shrink:0;overflow:hidden;border:1px solid var(--border);}
.char-img img{width:100%;height:100%;object-fit:cover;}
.char-info{flex:1;min-width:0;}
.char-mini-name{font-size:0.78rem;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.char-mini-role{font-size:0.65rem;color:var(--text3);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.no-results{text-align:center;padding:60px 20px;color:var(--text3);display:none;}
.no-results.show{display:block;}
.results-info{font-size:0.82rem;color:var(--text3);margin-bottom:20px;}
.results-info span{color:var(--gold);font-weight:600;}

@media(max-width:768px){.arcs-grid{grid-template-columns:1fr;}.stats-bar{gap:14px;}}
</style>
</head>
<body>

<nav>
  <div class="nav-wrap">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">⚓</div>
      <div><div class="logo-text">عالم ون بيس</div><div class="logo-sub">الموسوعة العربية الشاملة</div></div>
    </a>
    <a href="index.html" class="nav-back">← الرئيسية</a>
  </div>
</nav>

<section class="page-hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="breadcrumb">
      <a href="index.html">الرئيسية</a><span>›</span><span>الأركات</span>
    </div>
    <h1 class="page-title">أركات <span>ون بيس</span></h1>
    <p class="page-desc">كل أركات ون بيس مرتبة حسب الساغا — مع أهم الأحداث والشخصيات في كل آرك</p>
    <div class="current-arc">
      <div class="ca-dot"></div>
      <span class="ca-text">الآرك الحالي: آرك الباف</span>
      <span class="ca-chapter">آخر فصل: 1182</span>
    </div>
    <div class="stats-bar">
      <div><span class="stat-n" id="totalArcs">٠</span><div class="stat-l">آرك كامل</div></div>
      <div><span class="stat-n" id="totalSagas">٠</span><div class="stat-l">ساغا</div></div>
      <div><span class="stat-n">1182</span><div class="stat-l">آخر فصل</div></div>
      <div><span class="stat-n" id="ongoingCount">٠</span><div class="stat-l">آرك جارٍ</div></div>
    </div>
  </div>
</section>

<div class="filters">
  <div class="filter-row">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث باسم الآرك أو الشخصية..." oninput="render()">
    </div>
    <select class="filter-select" id="statusFilter" onchange="render()">
      <option value="all">الكل</option>
      <option value="مكتمل">مكتمل</option>
      <option value="جارٍ">جارٍ</option>
    </select>
    <select class="filter-select" id="sagaFilter" onchange="render()">
      <option value="all">جميع الساغات</option>
    </select>
  </div>
  <div class="tabs-row" id="tabsRow">
    <button class="tab active" onclick="setTab('all',this)">الكل</button>
  </div>
</div>

<div class="main">
  <div class="results-info">عرض <span id="countSpan">٠</span> آرك</div>
  <div id="container"></div>
  <div class="no-results" id="noResults">🔍 لا توجد نتائج</div>
</div>

<script src="arcs-data.js"></script>
<script>
// ملء الساغات في الفلتر والتابات
const sagaSel = document.getElementById('sagaFilter');
const tabsRow = document.getElementById('tabsRow');

SAGAS.forEach(s => {
  const opt = document.createElement('option');
  opt.value = s.id; opt.textContent = s.name;
  sagaSel.appendChild(opt);

  const tab = document.createElement('button');
  tab.className = 'tab';
  tab.textContent = s.name.replace('ساغا ','');
  tab.onclick = () => setTab(s.id, tab);
  tabsRow.appendChild(tab);
});

// إحصاءات
let totalArcs = 0, totalOngoing = 0;
SAGAS.forEach(s => {
  totalArcs += s.arcs.length;
  totalOngoing += s.arcs.filter(a => a.status === 'جارٍ').length;
});
document.getElementById('totalArcs').textContent = totalArcs;
document.getElementById('totalSagas').textContent = SAGAS.length;
document.getElementById('ongoingCount').textContent = totalOngoing;

function setTab(sagaId, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sagaFilter').value = sagaId;
  render();
}

function render() {
  const s = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const sagaId = document.getElementById('sagaFilter').value;
  const container = document.getElementById('container');
  const nr = document.getElementById('noResults');
  container.innerHTML = '';
  let total = 0;

  SAGAS.forEach(saga => {
    if (sagaId !== 'all' && saga.id !== sagaId) return;

    const filtered = saga.arcs.filter(arc => {
      const ms = !s || arc.name.toLowerCase().includes(s) ||
        arc.nameEn.toLowerCase().includes(s) ||
        arc.newChars.some(c => c.name.toLowerCase().includes(s)) ||
        arc.importantChars.some(c => c.name.toLowerCase().includes(s));
      const mst = status === 'all' || arc.status === status;
      return ms && mst;
    });

    if (filtered.length === 0) return;
    total += filtered.length;

    const group = document.createElement('div');
    group.className = 'saga-group';
    group.innerHTML = `
      <div class="saga-header">
        <div class="saga-badge" style="background:${saga.color}22;color:${saga.color};border:1px solid ${saga.color}44">
          ${saga.name}
        </div>
        <div class="saga-en">${saga.nameEn}</div>
        <div class="saga-count">${filtered.length} آرك</div>
      </div>
      <div class="arcs-grid" id="grid-${saga.id}"></div>`;
    container.appendChild(group);

    const grid = group.querySelector(`#grid-${saga.id}`);
    filtered.forEach((arc, i) => {
      const card = document.createElement('div');
      card.className = `arc-card ${arc.status === 'جارٍ' ? 'ongoing' : ''}`;
      card.style.cssText = `--arc-color:${saga.color};opacity:0;transform:translateY(16px);transition:opacity 0.4s ease ${i*0.07}s,transform 0.4s ease ${i*0.07}s,border-color 0.3s,transform 0.3s,box-shadow 0.3s`;

      // شخصيات جديدة
      const newCharsHTML = arc.newChars.length > 0 ? `
        <div class="chars-section-title new-chars">🆕 شخصيات جديدة</div>
        <div class="chars-grid-mini">
          ${arc.newChars.map(c => `
            <div class="char-mini">
              <div class="char-img">
                ${c.img ? `<img src="${c.img}" alt="${c.name}">` : '<span>👤</span>'}
              </div>
              <div class="char-info">
                <div class="char-mini-name">${c.name}</div>
                <div class="char-mini-role">${c.role}</div>
              </div>
            </div>`).join('')}
        </div>` : '';

      // شخصيات مهمة
      const impCharsHTML = arc.importantChars.length > 0 ? `
        <div class="chars-section-title imp-chars">⭐ شخصيات مهمة</div>
        <div class="chars-grid-mini">
          ${arc.importantChars.map(c => `
            <div class="char-mini">
              <div class="char-img">
                ${c.img ? `<img src="${c.img}" alt="${c.name}">` : '<span>👤</span>'}
              </div>
              <div class="char-info">
                <div class="char-mini-name">${c.name}</div>
                <div class="char-mini-role">${c.role}</div>
              </div>
            </div>`).join('')}
        </div>` : '';

      card.innerHTML = `
        <div class="arc-top">
          <div class="arc-status-row">
            <span class="arc-status ${arc.status === 'مكتمل' ? 'status-done' : 'status-ongoing'}">
              ${arc.status === 'مكتمل' ? '✅ مكتمل' : '🔄 جارٍ'}
            </span>
            <span class="arc-year">${arc.year}</span>
          </div>
          <div class="arc-name">${arc.name}</div>
          <div class="arc-name-en">${arc.nameEn}</div>
          <div class="arc-meta">
            <div class="arc-mi">📖 فصول: <span>${arc.chapters}</span></div>
            <div class="arc-mi">📺 حلقات: <span>${arc.episodes}</span></div>
          </div>
        </div>
        <div class="arc-events">
          <div class="events-title">⚡ أهم الأحداث</div>
          <div class="events-list">
            ${arc.keyEvents.map(e => `
              <div class="event-item">
                <div class="event-dot"></div>
                <span>${e}</span>
              </div>`).join('')}
          </div>
        </div>
        <div class="arc-chars">
          ${newCharsHTML}
          ${impCharsHTML}
        </div>`;

      grid.appendChild(card);
      setTimeout(() => { card.style.opacity='1'; card.style.transform='translateY(0)'; }, 50 + i*70);
    });
  });

  document.getElementById('countSpan').textContent = total;
  nr.classList.toggle('show', total === 0);
}

render();
</script>
</body>
</html>
