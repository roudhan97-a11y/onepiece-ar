<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فصول المانغا | عالم ون بيس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070B14;--bg2:#0D1421;--bg3:#141E30;--bg4:#1C2A40;--border:#243050;--border2:#2E3A56;--gold:#D4A843;--gold2:#B8902C;--gold3:#8A6B1E;--gold-glow:rgba(212,168,67,0.12);--red:#C0392B;--teal:#1ABC9C;--text:#EDE3D0;--text2:#A09080;--text3:#605850;--font:'IBM Plex Sans Arabic',sans-serif;--font-d:'Scheherazade New',serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden;line-height:1.7;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:3px;}
nav{position:fixed;top:0;width:100%;background:rgba(7,11,20,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,168,67,0.12);z-index:1000;}
.nav-wrap{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:68px;}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold3));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(212,168,67,0.25);}
.logo-text{font-family:var(--font-d);font-size:1.35rem;color:var(--gold);font-weight:700;line-height:1.1;}
.logo-sub{font-size:0.62rem;color:var(--text3);}
.nav-back{display:flex;align-items:center;gap:8px;color:var(--text2);text-decoration:none;font-size:0.88rem;padding:8px 14px;border-radius:8px;border:1px solid var(--border);transition:all 0.2s;}
.nav-back:hover{border-color:var(--gold2);color:var(--gold);}

.page-header{padding:110px 24px 40px;max-width:1400px;margin:0 auto;}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:var(--text3);margin-bottom:20px;}
.breadcrumb a{color:var(--gold);text-decoration:none;}
.page-title{font-family:var(--font-d);font-size:clamp(2rem,4vw,3rem);color:var(--text);font-weight:700;margin-bottom:8px;}
.page-title span{color:var(--gold);}
.page-desc{color:var(--text2);font-size:0.95rem;max-width:600px;line-height:1.8;}

/* CURRENT ARC BANNER */
.current-arc{background:linear-gradient(135deg,rgba(212,168,67,0.08),rgba(212,168,67,0.03));border:1px solid rgba(212,168,67,0.2);border-radius:14px;padding:18px 22px;margin:24px 0;display:flex;align-items:center;gap:16px;}
.ca-dot{width:10px;height:10px;background:var(--gold);border-radius:50%;animation:pulse 2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.ca-label{font-size:0.72rem;color:var(--text3);margin-bottom:2px;}
.ca-title{font-family:var(--font-d);font-size:1.1rem;color:var(--gold);font-weight:700;}
.ca-chapter{margin-right:auto;background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.2);color:var(--gold);font-size:0.78rem;font-weight:700;padding:6px 14px;border-radius:8px;}

.filters{max-width:1400px;margin:0 auto;padding:0 24px 24px;}
.search-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;min-width:250px;transition:border-color 0.2s;}
.search-box:focus-within{border-color:var(--gold2);}
.search-box input{background:none;border:none;outline:none;font-family:var(--font);font-size:0.9rem;color:var(--text);width:100%;direction:rtl;}
.search-box input::placeholder{color:var(--text3);}
.filter-select{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text2);font-family:var(--font);font-size:0.85rem;cursor:pointer;outline:none;direction:rtl;}
.filter-select:focus{border-color:var(--gold2);}
.tabs-row{display:flex;gap:8px;flex-wrap:wrap;}
.tab{padding:7px 14px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);font-size:0.8rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.tab.active,.tab:hover{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:700;}

.main{max-width:1400px;margin:0 auto;padding:0 24px 80px;}
.results-info{font-size:0.82rem;color:var(--text3);margin-bottom:16px;}
.results-info span{color:var(--gold);font-weight:600;}

/* ARC GROUP */
.arc-group{margin-bottom:36px;}
.arc-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.arc-badge{font-size:0.72rem;font-weight:700;padding:5px 14px;border-radius:6px;}
.arc-range{font-size:0.75rem;color:var(--text3);}
.arc-count{margin-right:auto;font-size:0.72rem;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:6px;}

/* CHAPTER ITEMS */
.chapters-list{display:flex;flex-direction:column;gap:8px;}
.chapter-item{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;transition:all 0.2s;cursor:pointer;}
.chapter-item:hover{border-color:var(--border2);background:var(--bg4);}
.chapter-item.latest{border-color:rgba(212,168,67,0.3);background:rgba(212,168,67,0.04);}
.ch-num{font-family:var(--font-d);font-size:1rem;font-weight:700;color:var(--gold);min-width:48px;}
.ch-new{font-size:0.6rem;font-weight:700;color:var(--teal);background:rgba(26,188,156,0.1);border:1px solid rgba(26,188,156,0.2);padding:1px 6px;border-radius:4px;margin-right:-6px;}
.ch-info{flex:1;}
.ch-title{font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:2px;}
.ch-summary{font-size:0.72rem;color:var(--text3);}
.ch-date{font-size:0.7rem;color:var(--text3);white-space:nowrap;}

.no-results{text-align:center;padding:60px 20px;color:var(--text3);display:none;}
.no-results.show{display:block;}
</style>
</head>
<body>
<nav>
  <div class="nav-wrap">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">⚓</div>
      <div><div class="logo-text">عالم ون بيس</div><div class="logo-sub">الموسوعة العربية الشاملة</div></div>
    </a>
    <a href="manga.html" class="nav-back">← المانغا</a>
  </div>
</nav>

<div class="page-header">
  <div class="breadcrumb">
    <a href="index.html">الرئيسية</a><span>›</span>
    <a href="manga.html">المانغا</a><span>›</span>
    <span>فصول المانغا</span>
  </div>
  <h1 class="page-title">📖 فصول <span>المانغا</span></h1>
  <p class="page-desc">تصفح جميع فصول مانغا ون بيس مع ملخصات وتواريخ الإصدار، مرتبة حسب الآركات.</p>

  <!-- الآرك الحالي -->
  <div class="current-arc">
    <div class="ca-dot"></div>
    <div>
      <div class="ca-label">الآرك الحالي — جارٍ الآن</div>
      <div class="ca-title">آرك الباف (Egghead Aftermath)</div>
    </div>
    <div class="ca-chapter">📖 آخر فصل: 1182</div>
  </div>
</div>

<div class="filters">
  <div class="search-row">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث برقم الفصل أو العنوان..." oninput="render()">
    </div>
    <select class="filter-select" id="arcFilter" onchange="render()">
      <option value="all">جميع الآركات</option>
    </select>
  </div>
  <div class="tabs-row" id="tabsRow"></div>
</div>

<div class="main">
  <div class="results-info">عرض <span id="countSpan">٠</span> فصل</div>
  <div id="container"></div>
  <div class="no-results" id="noResults">🔍 لا توجد نتائج</div>
</div>

<script src="manga-data.js"></script>
<script>
// ملء قائمة الآركات
const arcSel = document.getElementById('arcFilter');
const tabsRow = document.getElementById('tabsRow');

// Tab الكل
const allTab = document.createElement('button');
allTab.className = 'tab active';
allTab.textContent = 'الكل';
allTab.onclick = () => setTab('all', allTab);
tabsRow.appendChild(allTab);

ARCS.forEach(a => {
  const opt = document.createElement('option');
  opt.value = a.id; opt.textContent = a.name;
  arcSel.appendChild(opt);

  const tab = document.createElement('button');
  tab.className = 'tab';
  tab.textContent = a.name;
  tab.style.setProperty('--tab-color', a.color);
  tab.onclick = () => setTab(a.id, tab);
  tabsRow.appendChild(tab);
});

function setTab(arc, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('arcFilter').value = arc;
  render();
}

function render() {
  const s = document.getElementById('searchInput').value.toLowerCase();
  const arc = document.getElementById('arcFilter').value;
  const container = document.getElementById('container');
  const nr = document.getElementById('noResults');
  container.innerHTML = '';

  const filtered = CHAPTERS_DATA.filter(c => {
    const ms = !s || String(c.number).includes(s) || (c.title && c.title.toLowerCase().includes(s)) || (c.summary && c.summary.toLowerCase().includes(s));
    const ma = arc === 'all' || c.arc === arc;
    return ms && ma;
  });

  document.getElementById('countSpan').textContent = filtered.length;
  nr.classList.toggle('show', filtered.length === 0);

  // تجميع حسب الآرك
  const groups = {};
  filtered.forEach(c => {
    if (!groups[c.arc]) groups[c.arc] = [];
    groups[c.arc].push(c);
  });

  const maxChapter = Math.max(...CHAPTERS_DATA.map(c => c.number));

  Object.keys(groups).forEach(arcId => {
    const arcInfo = ARCS.find(a => a.id === arcId) || { name: arcId, color: '#D4A843' };
    const chapters = groups[arcId];
    const nums = chapters.map(c => c.number);
    const min = Math.min(...nums), max = Math.max(...nums);

    const group = document.createElement('div');
    group.className = 'arc-group';
    group.innerHTML = `
      <div class="arc-header">
        <div class="arc-badge" style="background:${arcInfo.color}22;color:${arcInfo.color};border:1px solid ${arcInfo.color}44">
          ${arcInfo.name}
        </div>
        <div class="arc-range">الفصول ${min}–${max === maxChapter ? max + ' (مستمر)' : max}</div>
        <div class="arc-count">${chapters.length} فصل</div>
      </div>
      <div class="chapters-list" id="list-${arcId}"></div>`;
    container.appendChild(group);

    const list = group.querySelector(`#list-${arcId}`);
    chapters.forEach(c => {
      const isLatest = c.number === maxChapter;
      const item = document.createElement('div');
      item.className = `chapter-item ${isLatest ? 'latest' : ''}`;
      item.innerHTML = `
        <div class="ch-num">#${c.number}</div>
        ${isLatest ? '<div class="ch-new">جديد</div>' : ''}
        <div class="ch-info">
          <div class="ch-title">${c.title || 'الفصل ' + c.number}</div>
          <div class="ch-summary">${c.summary || ''}</div>
        </div>
        <div class="ch-date">${c.date}</div>`;
      list.appendChild(item);
    });
  });
}

render();
</script>
</body>
</html>
