<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الشخصيات | عالم ون بيس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070B14;--bg2:#0D1421;--bg3:#141E30;--bg4:#1C2A40;--border:#243050;--border2:#2E3A56;--gold:#D4A843;--gold2:#B8902C;--gold3:#8A6B1E;--gold-glow:rgba(212,168,67,0.12);--red:#C0392B;--teal:#1ABC9C;--text:#EDE3D0;--text2:#A09080;--text3:#605850;--font:'IBM Plex Sans Arabic',sans-serif;--font-d:'Scheherazade New',serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden;line-height:1.7;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:3px;}
nav{position:fixed;top:0;width:100%;background:rgba(7,11,20,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,168,67,0.12);z-index:1000;}
.nav-wrap{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:68px;}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold3));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(212,168,67,0.25);}
.logo-text{font-family:var(--font-d);font-size:1.35rem;color:var(--gold);font-weight:700;line-height:1.1;}
.logo-sub{font-size:0.62rem;color:var(--text3);}
.nav-back{display:flex;align-items:center;gap:8px;color:var(--text2);text-decoration:none;font-size:0.88rem;padding:8px 14px;border-radius:8px;border:1px solid var(--border);transition:all 0.2s;}
.nav-back:hover{border-color:var(--gold2);color:var(--gold);}
.page-header{padding:120px 24px 40px;max-width:1400px;margin:0 auto;}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:var(--text3);margin-bottom:20px;}
.breadcrumb a{color:var(--gold);text-decoration:none;}
.page-title{font-family:var(--font-d);font-size:clamp(2rem,4vw,3rem);color:var(--text);font-weight:700;margin-bottom:8px;}
.page-title span{color:var(--gold);}
.page-desc{color:var(--text2);font-size:0.95rem;max-width:500px;}
.stats-bar{display:flex;gap:24px;flex-wrap:wrap;margin-top:24px;padding-top:24px;border-top:1px solid var(--border);}
.stat-n{font-family:var(--font-d);font-size:1.5rem;color:var(--gold);font-weight:700;display:block;}
.stat-l{font-size:0.72rem;color:var(--text3);}
.filters-section{max-width:1400px;margin:0 auto;padding:0 24px 28px;}
.search-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;min-width:250px;transition:border-color 0.2s;}
.search-box:focus-within{border-color:var(--gold2);}
.search-box input{background:none;border:none;outline:none;font-family:var(--font);font-size:0.9rem;color:var(--text);width:100%;direction:rtl;}
.search-box input::placeholder{color:var(--text3);}
.filter-select{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text2);font-family:var(--font);font-size:0.85rem;cursor:pointer;outline:none;direction:rtl;transition:border-color 0.2s;}
.filter-select:focus{border-color:var(--gold2);}
.tabs-row{display:flex;gap:8px;flex-wrap:wrap;}
.tab{padding:7px 16px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);font-size:0.82rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.tab.active,.tab:hover{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:700;}
.chars-section{max-width:1400px;margin:0 auto;padding:0 24px 80px;}
.results-info{font-size:0.82rem;color:var(--text3);margin-bottom:18px;}
.results-info span{color:var(--gold);font-weight:600;}
.chars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;}
.char-card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;overflow:hidden;text-decoration:none;display:block;transition:all 0.3s;position:relative;}
.char-card.clickable:hover{border-color:var(--gold2);transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,0.4);}
.char-card.soon{opacity:0.65;cursor:default;}
.card-img{height:160px;display:flex;align-items:center;justify-content:center;font-size:4.5rem;position:relative;overflow:hidden;}
.card-img::after{content:'';position:absolute;bottom:0;right:0;left:0;height:50px;background:linear-gradient(to top,var(--bg3),transparent);}
.soon-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.65);color:var(--text3);font-size:0.62rem;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;}
.complete-badge{position:absolute;top:10px;right:10px;background:rgba(26,188,156,0.2);color:var(--teal);border:1px solid rgba(26,188,156,0.3);font-size:0.62rem;font-weight:700;padding:3px 8px;border-radius:5px;}
.card-body{padding:14px 16px;}
.card-name{font-family:var(--font-d);font-size:1rem;font-weight:700;color:var(--text);margin-bottom:3px;}
.card-role{font-size:0.72rem;color:var(--text3);margin-bottom:10px;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.ctag{font-size:0.62rem;font-weight:600;padding:3px 7px;border-radius:4px;}
.ctag-red{background:rgba(192,57,43,0.15);color:#E74C3C;border:1px solid rgba(192,57,43,0.25);}
.ctag-gold{background:rgba(212,168,67,0.12);color:var(--gold);border:1px solid rgba(212,168,67,0.2);}
.ctag-teal{background:rgba(26,188,156,0.12);color:var(--teal);border:1px solid rgba(26,188,156,0.2);}
.ctag-blue{background:rgba(52,152,219,0.12);color:#5DADE2;border:1px solid rgba(52,152,219,0.2);}
.ctag-purple{background:rgba(155,89,182,0.12);color:#BB8FCE;border:1px solid rgba(155,89,182,0.2);}
.ctag-dead{background:rgba(100,100,100,0.15);color:#888;border:1px solid rgba(100,100,100,0.2);}
.bounty-row{display:flex;align-items:center;padding-top:10px;border-top:1px solid var(--border);font-size:0.72rem;}
.bounty-label{color:var(--text3);}
.bounty-val{color:var(--gold);font-weight:700;font-size:0.78rem;margin-right:auto;}
.no-results{text-align:center;padding:60px 20px;color:var(--text3);font-size:1rem;display:none;grid-column:1/-1;}
.no-results.show{display:block;}
@media(max-width:768px){.chars-grid{grid-template-columns:repeat(2,1fr);}}.
</style>
</head>
<body>
<nav>
  <div class="nav-wrap">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">⚓</div>
      <div><div class="logo-text">عالم ون بيس</div><div class="logo-sub">الموسوعة العربية الشاملة</div></div>
    </a>
    <a href="index.html" class="nav-back">← الرئيسية</a>
  </div>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="index.html">الرئيسية</a><span>›</span><span>الشخصيات</span></div>
  <h1 class="page-title">قائمة <span>الشخصيات</span></h1>
  <p class="page-desc">تصفح جميع شخصيات عالم ون بيس — تُحدَّث باستمرار مع كل فصل جديد</p>
  <div class="stats-bar">
    <div><span class="stat-n" id="totalStat">٠</span><div class="stat-l">شخصية في القاعدة</div></div>
    <div><span class="stat-n" id="completeStat">٠</span><div class="stat-l">صفحة مكتملة</div></div>
    <div><span class="stat-n">يتوسع</span><div class="stat-l">كل فترة</div></div>
  </div>
</div>

<div class="filters-section">
  <div class="search-row">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث باسم الشخصية..." oninput="renderChars()">
    </div>
    <select class="filter-select" id="groupFilter" onchange="renderChars()">
      <option value="all">جميع الانتماءات</option>
      <option value="pirate-king">ملك القراصنة</option>
      <option value="strawhat">قبعات القش</option>
      <option value="yonko">اليونكو</option>
      <option value="marine">البحرية</option>
      <option value="supernova">السوبر نوفا</option>
    </select>
    <select class="filter-select" id="statusFilter" onchange="renderChars()">
      <option value="all">الحالة: الكل</option>
      <option value="alive">حي</option>
      <option value="dead">متوفى</option>
    </select>
  </div>
  <div class="tabs-row">
    <button class="tab active" onclick="setTab('all',this)">الكل</button>
    <button class="tab" onclick="setTab('pirate-king',this)">ملك القراصنة</button>
    <button class="tab" onclick="setTab('strawhat',this)">قبعات القش</button>
    <button class="tab" onclick="setTab('yonko',this)">اليونكو</button>
    <button class="tab" onclick="setTab('marine',this)">البحرية</button>
    <button class="tab" onclick="setTab('supernova',this)">السوبر نوفا</button>
  </div>
</div>

<div class="chars-section">
  <div class="results-info">عرض <span id="showingCount">٠</span> شخصية</div>
  <div class="chars-grid" id="charsGrid">
    <div class="no-results" id="noResults">🔍 لا توجد نتائج</div>
  </div>
</div>

<script src="characters-data.js"></script>
<script>
let currentTab='all';
const tagClass={'pirate-king':'ctag-gold','strawhat':'ctag-red','yonko':'ctag-gold','marine':'ctag-blue','supernova':'ctag-purple','revolutionary':'ctag-teal'};
const tagLabel={'pirate-king':'ملك القراصنة','strawhat':'قبعات القش','yonko':'يونكو','marine':'البحرية','supernova':'سوبر نوفا','revolutionary':'الثوار'};

function setTab(g,btn){
  currentTab=g;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('groupFilter').value=g;
  renderChars();
}

function renderChars(){
  const s=document.getElementById('searchInput').value.toLowerCase().trim();
  const g=document.getElementById('groupFilter').value;
  const st=document.getElementById('statusFilter').value;
  currentTab=g;

  const filtered=CHARACTERS.filter(c=>{
    const ms=!s||c.name.toLowerCase().includes(s)||c.nameEn.toLowerCase().includes(s)||(c.nickname&&c.nickname.toLowerCase().includes(s));
    const mg=g==='all'||c.group.includes(g);
    const mst=st==='all'||c.status===st;
    return ms&&mg&&mst;
  });

  const grid=document.getElementById('charsGrid');
  const nr=document.getElementById('noResults');
  grid.querySelectorAll('.char-card').forEach(el=>el.remove());

  if(filtered.length===0){nr.classList.add('show');}
  else{
    nr.classList.remove('show');
    filtered.forEach((c,i)=>{
      const el=document.createElement(c.complete&&c.page?'a':'div');
      if(c.complete&&c.page)el.href=c.page;
      el.className=`char-card ${c.complete?'clickable':'soon'}`;
      el.style.cssText=`opacity:0;transform:translateY(16px);transition:opacity 0.4s ease ${i*0.05}s,transform 0.4s ease ${i*0.05}s`;
      const mg=c.group[0];
      el.innerHTML=`
        <div class="card-img" style="background:${c.bgColor}">
          ${c.emoji}
          ${c.complete?'<div class="complete-badge">✅ مكتملة</div>':'<div class="soon-badge">قريباً</div>'}
        </div>
        <div class="card-body">
          <div class="card-name">${c.name}</div>
          <div class="card-role">${c.role}</div>
          <div class="card-tags">
            <span class="ctag ${tagClass[mg]||'ctag-blue'}">${tagLabel[mg]||mg}</span>
            ${c.fruit?`<span class="ctag ctag-purple">${c.fruit}</span>`:''}
            ${c.status==='dead'?'<span class="ctag ctag-dead">متوفى</span>':''}
          </div>
          <div class="bounty-row">
            <span class="bounty-label">${c.bounty?'المكافأة':'الرتبة'}</span>
            <span class="bounty-val">${c.bounty?c.bounty+' ب':c.role.split('—')[0].trim()}</span>
          </div>
        </div>`;
      grid.insertBefore(el,nr);
      setTimeout(()=>{el.style.opacity='1';el.style.transform='translateY(0)';},50+i*50);
    });
  }
  document.getElementById('showingCount').textContent=filtered.length;
}

document.getElementById('totalStat').textContent=CHARACTERS.length;
document.getElementById('completeStat').textContent=CHARACTERS.filter(c=>c.complete).length;
renderChars();
</script>
</body>
</html>
