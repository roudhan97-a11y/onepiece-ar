<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="المانغا | موسوعة عالم ون بيس العربية الشاملة">
<title>المانغا | عالم ون بيس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070B14;--bg2:#0D1421;--bg3:#141E30;--bg4:#1C2A40;
  --border:#243050;--border2:#2E3A56;
  --gold:#D4A843;--gold2:#B8902C;--gold3:#8A6B1E;
  --gold-glow:rgba(212,168,67,0.12);
  --red:#C0392B;--teal:#1ABC9C;
  --text:#EDE3D0;--text2:#A09080;--text3:#605850;
  --font:'IBM Plex Sans Arabic',sans-serif;
  --font-d:'Scheherazade New',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden;line-height:1.7;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:3px;}

/* NAV */
nav{position:fixed;top:0;width:100%;background:rgba(7,11,20,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,168,67,0.12);z-index:1000;}
.nav-wrap{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:68px;}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold3));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(212,168,67,0.25);}
.logo-text{font-family:var(--font-d);font-size:1.35rem;color:var(--gold);font-weight:700;line-height:1.1;}
.logo-sub{font-size:0.62rem;color:var(--text3);}
.nav-back{display:flex;align-items:center;gap:8px;color:var(--text2);text-decoration:none;font-size:0.88rem;padding:8px 14px;border-radius:8px;border:1px solid var(--border);transition:all 0.2s;}
.nav-back:hover{border-color:var(--gold2);color:var(--gold);}

/* HERO */
.page-hero{min-height:40vh;display:flex;align-items:flex-end;position:relative;overflow:hidden;padding-top:68px;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(212,168,67,0.06) 0%,transparent 60%),linear-gradient(180deg,#0A1020 0%,var(--bg) 100%);}
.hero-bg::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(212,168,67,0.02) 59px,rgba(212,168,67,0.02) 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(212,168,67,0.02) 59px,rgba(212,168,67,0.02) 60px);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,transparent 60%);}
.hero-content{position:relative;z-index:2;max-width:1400px;margin:0 auto;padding:60px 24px 40px;width:100%;}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:var(--text3);margin-bottom:20px;}
.breadcrumb a{color:var(--gold);text-decoration:none;}
.page-title{font-family:var(--font-d);font-size:clamp(2.2rem,4vw,3.5rem);color:var(--text);font-weight:700;margin-bottom:8px;}
.page-title span{color:var(--gold);}
.page-desc{color:var(--text2);font-size:0.95rem;max-width:550px;line-height:1.8;}
.update-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(26,188,156,0.08);border:1px solid rgba(26,188,156,0.2);color:var(--teal);padding:6px 14px;border-radius:8px;font-size:0.75rem;margin-top:16px;}

/* MAIN SECTIONS */
.main{max-width:1400px;margin:0 auto;padding:60px 24px 80px;}

/* SECTION HEADER */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.sec-title-wrap{display:flex;align-items:center;gap:10px;}
.sec-icon{font-size:1.4rem;}
.sec-title{font-family:var(--font-d);font-size:1.4rem;color:var(--text);font-weight:700;}
.sec-count{font-size:0.75rem;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:6px;}
.view-all{color:var(--gold);font-size:0.82rem;text-decoration:none;border:1px solid rgba(212,168,67,0.2);padding:6px 14px;border-radius:8px;transition:all 0.2s;}
.view-all:hover{background:var(--gold-glow);border-color:var(--gold2);}

/* MAIN CARDS GRID */
.main-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-bottom:60px;}
.main-card{background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:28px;text-decoration:none;display:block;transition:all 0.3s;position:relative;overflow:hidden;cursor:pointer;}
.main-card::before{content:'';position:absolute;top:0;right:0;width:100px;height:100px;background:radial-gradient(circle at top right,var(--card-glow,rgba(212,168,67,0.06)),transparent 70%);}
.main-card::after{content:'';position:absolute;bottom:0;right:0;left:0;height:3px;background:var(--card-accent,var(--gold));transform:scaleX(0);transform-origin:right;transition:transform 0.3s;}
.main-card:hover::after{transform:scaleX(1);}
.main-card:hover{border-color:var(--card-border,var(--gold2));transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.4);background:var(--bg4);}
.mc-icon{font-size:2.8rem;margin-bottom:16px;display:block;}
.mc-title{font-family:var(--font-d);font-size:1.3rem;color:var(--text);font-weight:700;margin-bottom:8px;}
.mc-desc{font-size:0.84rem;color:var(--text2);line-height:1.7;margin-bottom:16px;}
.mc-stats{display:flex;gap:12px;flex-wrap:wrap;}
.mc-stat{font-size:0.72rem;color:var(--card-accent,var(--gold));font-weight:600;background:rgba(212,168,67,0.06);padding:3px 10px;border-radius:5px;border:1px solid rgba(212,168,67,0.15);}
.mc-arrow{position:absolute;bottom:20px;left:20px;font-size:1.2rem;color:var(--card-accent,var(--gold));opacity:0;transition:all 0.3s;}
.main-card:hover .mc-arrow{opacity:1;transform:translateX(-4px);}

/* SBS PREVIEW */
.sbs-preview{margin-bottom:60px;}
.sbs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.sbs-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:all 0.2s;}
.sbs-card:hover{border-color:var(--gold2);background:var(--bg4);}
.sbs-vol{font-size:0.7rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
.sbs-q{font-size:0.84rem;color:var(--text2);font-style:italic;margin-bottom:8px;padding-right:12px;border-right:2px solid var(--gold3);}
.sbs-a{font-size:0.88rem;color:var(--text);line-height:1.7;}
.sbs-a strong{color:var(--gold);}
.sbs-char{position:absolute;top:14px;left:14px;font-size:0.65rem;font-weight:700;color:var(--text3);background:var(--bg2);padding:2px 8px;border-radius:4px;}

/* COVER STORIES PREVIEW */
.covers-preview{margin-bottom:60px;}
.covers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.cover-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden;text-decoration:none;display:block;transition:all 0.3s;cursor:pointer;}
.cover-card:hover{border-color:var(--gold2);transform:translateY(-4px);box-shadow:0 12px 35px rgba(0,0,0,0.4);}
.cover-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative;}
.cover-img::after{content:'';position:absolute;bottom:0;right:0;left:0;height:40px;background:linear-gradient(to top,var(--bg3),transparent);}
.cover-body{padding:14px 16px;}
.cover-title{font-family:var(--font-d);font-size:1rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.cover-chapters{font-size:0.72rem;color:var(--gold);margin-bottom:6px;}
.cover-desc{font-size:0.78rem;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cover-status{display:inline-flex;margin-top:8px;font-size:0.65rem;font-weight:700;color:var(--teal);background:rgba(26,188,156,0.1);border:1px solid rgba(26,188,156,0.2);padding:2px 8px;border-radius:4px;}

/* CHAPTERS PREVIEW */
.chapters-preview{margin-bottom:60px;}
.chapters-list{display:flex;flex-direction:column;gap:10px;}
.chapter-item{display:flex;align-items:center;gap:16px;padding:14px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;transition:all 0.2s;cursor:pointer;}
.chapter-item:hover{border-color:var(--border2);background:var(--bg4);}
.ch-num{font-family:var(--font-d);font-size:1.1rem;font-weight:700;color:var(--gold);min-width:50px;}
.ch-info{flex:1;}
.ch-title{font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:3px;}
.ch-meta{font-size:0.72rem;color:var(--text3);}
.ch-arc{font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:5px;margin-right:auto;}
.ch-date{font-size:0.7rem;color:var(--text3);}

/* SEP */
.sep{height:1px;background:linear-gradient(to left,transparent,var(--border),transparent);margin:48px 0;}

/* RESPONSIVE */
@media(max-width:768px){
  .main-grid{grid-template-columns:1fr 1fr;}
  .sbs-grid,.covers-grid{grid-template-columns:1fr;}
}
@media(max-width:480px){.main-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-wrap">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">⚓</div>
      <div><div class="logo-text">عالم ون بيس</div><div class="logo-sub">الموسوعة العربية الشاملة</div></div>
    </a>
    <a href="index.html" class="nav-back">← الرئيسية</a>
  </div>
</nav>

<!-- HERO -->
<section class="page-hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="breadcrumb">
      <a href="index.html">الرئيسية</a><span>›</span><span>المانغا</span>
    </div>
    <h1 class="page-title">موسوعة <span>المانغا</span></h1>
    <p class="page-desc">كل ما يتعلق بمانغا ون بيس — من فصول وSBS وقصص أغلفة ومحتوى حصري من Oda</p>
    <div class="update-badge">✅ آخر تحديث: الفصل 1130</div>
  </div>
</section>

<!-- MAIN -->
<div class="main">

  <!-- الأقسام الرئيسية -->
  <div class="main-grid" id="mainGrid"></div>

  <div class="sep"></div>

  <!-- SBS Preview -->
  <div class="sbs-preview">
    <div class="sec-head">
      <div class="sec-title-wrap">
        <span class="sec-icon">📬</span>
        <span class="sec-title">آخر SBS</span>
        <span class="sec-count" id="sbsCount">٠ سؤال</span>
      </div>
      <a href="sbs.html" class="view-all">عرض الكل ←</a>
    </div>
    <div class="sbs-grid" id="sbsGrid"></div>
  </div>

  <div class="sep"></div>

  <!-- Cover Stories Preview -->
  <div class="covers-preview">
    <div class="sec-head">
      <div class="sec-title-wrap">
        <span class="sec-icon">🎨</span>
        <span class="sec-title">قصص الأغلفة</span>
        <span class="sec-count" id="coversCount">٠ قصة</span>
      </div>
      <a href="cover-stories.html" class="view-all">عرض الكل ←</a>
    </div>
    <div class="covers-grid" id="coversGrid"></div>
  </div>

  <div class="sep"></div>

  <!-- Chapters Preview -->
  <div class="chapters-preview">
    <div class="sec-head">
      <div class="sec-title-wrap">
        <span class="sec-icon">📖</span>
        <span class="sec-title">أحدث الفصول</span>
      </div>
      <a href="chapters.html" class="view-all">كل الفصول ←</a>
    </div>
    <div class="chapters-list" id="chaptersGrid"></div>
  </div>

</div>

<script src="manga-data.js"></script>
<script>
// الأقسام الرئيسية
const SECTIONS = [
  {
    icon: '📖',
    title: 'فصول المانغا',
    desc: 'تصفح كل فصول ون بيس مع ملخصات وتواريخ الإصدار، مرتبة حسب الآرك.',
    stats: ['1130+ فصل', 'آرك إيغهيد'],
    link: 'chapters.html',
    accent: '#D4A843',
    glow: 'rgba(212,168,67,0.06)'
  },
  {
    icon: '📬',
    title: 'SBS — أسئلة وأجوبة',
    desc: 'كل أسئلة وأجوبة Oda في ركن SBS مرتبة حسب المجلد وقابلة للبحث.',
    stats: ['100+ مجلد', 'إجابات حصرية'],
    link: 'sbs.html',
    accent: '#1ABC9C',
    glow: 'rgba(26,188,156,0.06)'
  },
  {
    icon: '🎨',
    title: 'قصص الأغلفة',
    desc: 'القصص المخفية في أغلفة المانغا — من مغامرات إيني على القمر لقصة كوبي.',
    stats: ['9+ قصة', 'محتوى نادر'],
    link: 'cover-stories.html',
    accent: '#9B59B6',
    glow: 'rgba(155,89,182,0.06)'
  },
  {
    icon: '✏️',
    title: 'ملاحظات Oda',
    desc: 'تصريحات المؤلف خارج المانغا — مقابلات، تصريحات، وأسرار كشفها Oda.',
    stats: ['مصادر رسمية', 'محدّث باستمرار'],
    link: '#',
    accent: '#E67E22',
    glow: 'rgba(230,126,34,0.06)'
  }
];

// بناء الأقسام
const mg = document.getElementById('mainGrid');
SECTIONS.forEach((s,i) => {
  const el = document.createElement('a');
  el.href = s.link;
  el.className = 'main-card';
  el.style.cssText = `--card-accent:${s.accent};--card-glow:${s.glow};--card-border:${s.accent};opacity:0;transform:translateY(20px);transition:opacity 0.5s ease ${i*0.1}s,transform 0.5s ease ${i*0.1}s,border-color 0.3s,transform 0.3s,box-shadow 0.3s`;
  el.innerHTML = `
    <span class="mc-icon">${s.icon}</span>
    <div class="mc-title">${s.title}</div>
    <div class="mc-desc">${s.desc}</div>
    <div class="mc-stats">${s.stats.map(st=>`<span class="mc-stat">${st}</span>`).join('')}</div>
    <div class="mc-arrow">←</div>`;
  mg.appendChild(el);
  setTimeout(()=>{el.style.opacity='1';el.style.transform='translateY(0)';},100+i*100);
});

// بناء SBS
const sbsGrid = document.getElementById('sbsGrid');
let totalQ = 0;
SBS_DATA.slice(0,3).forEach(vol => {
  vol.questions.slice(0,1).forEach(q => {
    totalQ++;
    const el = document.createElement('div');
    el.className = 'sbs-card';
    el.innerHTML = `
      <div class="sbs-vol">📬 المجلد ${vol.vol} — ${vol.year}</div>
      ${q.char ? `<div class="sbs-char">${q.char}</div>` : ''}
      <div class="sbs-q">${q.q}</div>
      <div class="sbs-a">${q.a}</div>`;
    sbsGrid.appendChild(el);
  });
});
SBS_DATA.forEach(v => totalQ += v.questions.length);
document.getElementById('sbsCount').textContent = totalQ + ' سؤال';

// بناء قصص الأغلفة
const cg = document.getElementById('coversGrid');
COVER_STORIES.forEach((c,i) => {
  const el = document.createElement('a');
  el.href = 'cover-stories.html';
  el.className = 'cover-card';
  el.innerHTML = `
    <div class="cover-img" style="background:${c.bgColor}">${c.emoji}</div>
    <div class="cover-body">
      <div class="cover-title">${c.title}</div>
      <div class="cover-chapters">الفصول ${c.chapters}</div>
      <div class="cover-desc">${c.description}</div>
      <span class="cover-status">✅ ${c.status}</span>
    </div>`;
  cg.appendChild(el);
});
document.getElementById('coversCount').textContent = COVER_STORIES.length + ' قصة';

// بناء الفصول
const arcColors = {'egghead':'#D4A843','wano':'#E74C3C','marineford':'#1ABC9C','dressrosa':'#E67E22','wholecake':'#9B59B6','skypiea':'#F1C40F','alabasta':'#3498DB'};
const arcNames = {'egghead':'إيغهيد','wano':'وانو','marineford':'مارينفورد','dressrosa':'دريسروزا','wholecake':'Whole Cake','skypiea':'سكاي بييا','alabasta':'ألاباستا'};
const chg = document.getElementById('chaptersGrid');
CHAPTERS_DATA.slice(0,6).forEach(c => {
  const color = arcColors[c.arc] || '#D4A843';
  const arcName = arcNames[c.arc] || c.arc;
  const el = document.createElement('div');
  el.className = 'chapter-item';
  el.innerHTML = `
    <div class="ch-num">#${c.number}</div>
    <div class="ch-info">
      <div class="ch-title">${c.title || 'الفصل ' + c.number}</div>
      <div class="ch-meta">${c.summary}</div>
    </div>
    <span class="ch-arc" style="background:${color}22;color:${color};border:1px solid ${color}44">${arcName}</span>
    <div class="ch-date">${c.date}</div>`;
  chg.appendChild(el);
});

// Scroll animation
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';}
  });
},{threshold:0.08});
document.querySelectorAll('.sbs-card,.cover-card,.chapter-item').forEach(el => {
  el.style.opacity='0';el.style.transform='translateY(12px)';
  el.style.transition='opacity 0.4s ease,transform 0.4s ease';
  obs.observe(el);
});
</script>
</body>
</html>
